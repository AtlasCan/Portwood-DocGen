<template>
    <lightning-card title="DocGen Setup" icon-name="custom:custom108">
        <div class="slds-var-p-around_medium">

            <!-- Custom Fonts Section -->
            <div class="slds-section slds-is-open">
                <h3 class="slds-text-heading_small slds-var-m-bottom_small">Custom Fonts for PDF Generation</h3>
                <p class="slds-text-body_regular slds-var-m-bottom_medium">
                    Upload custom fonts (TTF, WOFF, WOFF2) to use in your PDF documents. When a template uses a font that matches an uploaded font family, it will be embedded in the generated PDF.
                </p>

                <!-- Font List -->
                <template if:true={hasFonts}>
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-var-m-bottom_medium">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col"><div class="slds-truncate">Font Family</div></th>
                                <th scope="col"><div class="slds-truncate">Weight</div></th>
                                <th scope="col"><div class="slds-truncate">Style</div></th>
                                <th scope="col"><div class="slds-truncate">Format</div></th>
                                <th scope="col"><div class="slds-truncate">Actions</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={fonts} for:item="font">
                                <tr key={font.Id}>
                                    <td><div class="slds-truncate"><strong>{font.Font_Family__c}</strong></div></td>
                                    <td><div class="slds-truncate">{font.Font_Weight__c}</div></td>
                                    <td><div class="slds-truncate">{font.Font_Style__c}</div></td>
                                    <td><div class="slds-truncate">{font.formatLabel}</div></td>
                                    <td>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare"
                                            alternative-text="Delete font"
                                            data-id={font.Id}
                                            onclick={handleDeleteFont}>
                                        </lightning-button-icon>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <template if:false={hasFonts}>
                    <div class="slds-illustration slds-illustration_small slds-var-m-bottom_medium">
                        <p class="slds-text-body_regular slds-text-color_weak">No custom fonts uploaded yet. PDFs will use standard web-safe fonts (Arial, Times New Roman, etc.).</p>
                    </div>
                </template>

                <!-- Upload Button -->
                <template if:false={showFontUpload}>
                    <lightning-button
                        label="Upload Font"
                        variant="brand"
                        icon-name="utility:upload"
                        onclick={handleShowUpload}>
                    </lightning-button>
                </template>

                <!-- Upload Form -->
                <template if:true={showFontUpload}>
                    <div class="slds-box slds-var-m-top_small">
                        <h4 class="slds-text-heading_small slds-var-m-bottom_small">Upload New Font</h4>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-m-bottom_small">
                                <lightning-input
                                    label="Font Family Name"
                                    placeholder="e.g., Montserrat, Open Sans"
                                    value={fontFamily}
                                    onchange={handleFontFamilyChange}
                                    required>
                                </lightning-input>
                                <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small">Must match the font name in your DOCX template.</p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-m-bottom_small">
                                <lightning-input
                                    type="file"
                                    label="Font File"
                                    accept=".ttf,.woff,.woff2"
                                    onchange={handleFontFileChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-var-m-bottom_small">
                                <lightning-combobox
                                    label="Weight"
                                    value={fontWeight}
                                    options={fontWeightOptions}
                                    onchange={handleFontWeightChange}>
                                </lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-var-m-bottom_small">
                                <lightning-combobox
                                    label="Style"
                                    value={fontStyle}
                                    options={fontStyleOptions}
                                    onchange={handleFontStyleChange}>
                                </lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-var-m-bottom_small">
                                <lightning-combobox
                                    label="Format"
                                    value={fontFormat}
                                    options={fontFormatOptions}
                                    onchange={handleFontFormatChange}>
                                </lightning-combobox>
                            </div>
                        </div>

                        <div class="slds-var-m-top_small">
                            <lightning-button
                                label="Upload"
                                variant="brand"
                                disabled={isUploadDisabled}
                                onclick={handleUploadFont}>
                            </lightning-button>
                            <lightning-button
                                label="Cancel"
                                variant="neutral"
                                class="slds-var-m-left_x-small"
                                onclick={handleCancelUpload}>
                            </lightning-button>
                        </div>

                        <div class="slds-box slds-theme_shade slds-var-m-top_small">
                            <p class="slds-text-body_small"><strong>Tip:</strong> For full font coverage, upload 4 variants of each font family:</p>
                            <ul class="slds-list_dotted slds-text-body_small slds-var-m-top_xx-small">
                                <li>Regular (normal weight, normal style)</li>
                                <li>Bold (bold weight, normal style)</li>
                                <li>Italic (normal weight, italic style)</li>
                                <li>Bold Italic (bold weight, italic style)</li>
                            </ul>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
